{{template "head" .}}
{{template "nav" .}}
<main class="app-main">
  <div class="container-md">

    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-lg font-semibold text-white">Work Blocks</h1>
        <p class="text-xs text-muted mt-0.5">Shippable units of work</p>
      </div>
      <button onclick="document.getElementById('create-form').classList.toggle('hidden')" class="btn btn-primary">Propose Block</button>
    </div>

    <!-- Create form -->
    <form id="create-form" method="POST" action="/work-blocks" class="hidden mb-6 card card-section space-y-3">
      <div>
        <label for="wb-title">Title</label>
        <input id="wb-title" name="title" type="text" required placeholder="e.g. User Authentication">
      </div>
      <div>
        <label for="wb-goal">Goal</label>
        <textarea id="wb-goal" name="goal" rows="2" placeholder="What should this block deliver when shipped?"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Create</button>
    </form>

    <!-- Blocks list -->
    <div class="space-y-2 stagger">
      {{range .Blocks}}
      <a href="/work-blocks/{{.ID}}" class="card" style="text-decoration:none;color:inherit;display:block;padding:1rem 1.25rem;">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <span class="badge {{wbStatusColor .Status}}">{{upper .Status}}</span>
            <span class="text-sm font-medium text-light">{{.Title}}</span>
          </div>
          <span class="text-xs text-muted tabular-nums">{{timeAgo .CreatedAt}}</span>
        </div>
        {{if .Goal}}<p class="text-xs text-muted mt-1.5 line-clamp-1">{{.Goal}}</p>{{end}}
      </a>
      {{else}}
      <div class="card list-empty" style="padding:3rem 1.25rem;">No work blocks yet. Propose one to get started.</div>
      {{end}}
    </div>

  </div>
</main>
{{template "foot" .}}

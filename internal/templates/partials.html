    <style>
/* ── Reset Pico defaults for our app shell ── */
:root[data-theme="dark"] {

  --pico-card-background-color: rgba(39,39,42,0.5);
  --pico-card-border-color: #27272a;

  --pico-muted-color: #71717a;
  --pico-primary: #6366f1;

  --pico-form-element-background-color: #18181b;
  --pico-form-element-border-color: #3f3f46;
  --pico-form-element-color: #e4e4e7;
  --pico-form-element-placeholder-color: #52525b;

  --pico-typography-spacing-vertical: 0;
}

body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; margin: 0; min-height: 100vh; display: flex; background: #09090b; color: #e4e4e7; }
h1, h2, h3, h4, h5, h6 { --pico-typography-spacing-vertical: 0; margin-bottom: 0; }

article > header, article > footer { background: transparent; padding: 0; border: none; }
p { margin-bottom: 0; }

/* ── Layout ── */
.app-sidebar { width: 14rem; background: #18181b; border-right: 1px solid #27272a; display: flex; flex-direction: column; position: fixed; height: 100%; z-index: 40; transition: transform 0.2s; }
.app-main { flex: 1; margin-left: 14rem; padding: 2rem; padding-top: 2rem; }
.container-lg { max-width: 72rem; margin: 0 auto; }
.container-md { max-width: 64rem; margin: 0 auto; }

/* ── Grid ── */
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
.grid-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
.grid-5 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }

  .grid-cols-2-1 { grid-template-columns: 2fr 1fr; }
}
@media (min-width: 1024px) {
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-5 { grid-template-columns: repeat(5, 1fr); }
}

/* ── Sidebar nav ── */
.sidebar-brand { padding: 1.25rem 1rem; border-bottom: 1px solid #27272a; display: flex; align-items: center; justify-content: space-between; }
.sidebar-brand h1 { font-size: 0.875rem; font-weight: 600; letter-spacing: 0.025em; color: #f4f4f5; margin: 0; }
.sidebar-brand p { font-size: 0.75rem; color: #71717a; margin: 0.125rem 0 0; }
.sidebar-nav { flex: 1; padding: 0.75rem 0.5rem; display: flex; flex-direction: column; gap: 0.125rem; }
.sidebar-nav a { display: flex; align-items: center; gap: 0.5rem; padding: 0.375rem 0.75rem; border-radius: 0.375rem; font-size: 0.875rem; color: #a1a1aa; text-decoration: none; transition: all 0.15s; }
.sidebar-nav a:hover { color: #e4e4e7; background: #27272a; }
.sidebar-nav a[aria-current="page"] { background: #27272a; color: #e4e4e7; }
.sidebar-footer { padding: 0.75rem; border-top: 1px solid #27272a; }
.sidebar-footer button { width: 100%; display: flex; align-items: center; gap: 0.5rem; padding: 0.375rem 0.75rem; border-radius: 0.375rem; font-size: 0.75rem; color: #71717a; background: none; border: none; cursor: pointer; transition: all 0.15s; }
.sidebar-footer button:hover { color: #d4d4d8; background: #27272a; }

/* ── Icons ── */

/* ── Cards ── */
.card { background: rgba(39,39,42,0.5); border: 1px solid #27272a; border-radius: 0.5rem; padding: 1rem; transition: border-color 0.15s; }
.card:hover { border-color: #3f3f46; }
.card-compact { padding: 0.75rem; }
.card-section { padding: 1.25rem; }

/* ── List rows ── */
.list-card { background: rgba(39,39,42,0.5); border: 1px solid #27272a; border-radius: 0.5rem; overflow: hidden; }
.list-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.625rem 1rem; transition: background 0.15s; text-decoration: none; color: inherit; border-bottom: 1px solid rgba(39,39,42,0.6); }
.list-row:last-child { border-bottom: none; }
a.list-row:hover { background: rgba(39,39,42,0.4); }
.list-empty { padding: 2.5rem 1rem; text-align: center; font-size: 0.875rem; color: #71717a; }

/* ── Badges ── */
.badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.125rem 0.5rem; border-radius: 0.25rem; font-size: 11px; font-weight: 500; white-space: nowrap; }
.badge-todo { background: rgba(82,82,91,0.8); color: #e4e4e7; }
.badge-in-progress { background: rgba(59,130,246,0.15); color: #60a5fa; outline: 1px solid rgba(59,130,246,0.25); outline-offset: -1px; }
.badge-in-review { background: rgba(245,158,11,0.15); color: #fbbf24; outline: 1px solid rgba(245,158,11,0.25); outline-offset: -1px; }

.badge-blocked { background: rgba(239,68,68,0.15); color: #f87171; outline: 1px solid rgba(239,68,68,0.25); outline-offset: -1px; }
.badge-cancelled { background: rgba(113,113,122,0.1); color: #71717a; outline: 1px solid rgba(113,113,122,0.2); outline-offset: -1px; }
.badge-proposed { background: rgba(168,85,247,0.15); color: #c084fc; outline: 1px solid rgba(168,85,247,0.25); outline-offset: -1px; }
.badge-default { background: #3f3f46; color: #d4d4d8; }

/* ── Status dots ── */
.dot { width: 0.5rem; height: 0.5rem; border-radius: 50%; flex-shrink: 0; }
.dot-green { background: #34d399; }
.dot-muted { background: #a1a1aa; }
.dot-blue { background: #60a5fa; }
.dot-amber { background: #fbbf24; }
.dot-red { background: #f87171; }

/* ── Priority colors ── */
.priority-low { color: #34d399; }
.priority-medium { color: #facc15; }
.priority-high { color: #fb923c; }
.priority-urgent { color: #f87171; }
.priority-none { color: #71717a; }

/* ── Diff ── */
.diff-hunk { color: #818cf8; background: rgba(79,70,229,0.1); padding: 0 0.5rem; border-radius: 2px; }
.diff-meta { color: #71717a; font-weight: 500; padding: 0 0.5rem; }
.diff-add { color: #34d399; background: rgba(16,185,129,0.1); padding: 0 0.5rem; border-radius: 2px; }
.diff-del { color: #f87171; background: rgba(239,68,68,0.1); padding: 0 0.5rem; border-radius: 2px; }
.diff-context { color: #71717a; padding: 0 0.5rem; }

/* ── Tabs ── */
.tab-nav { display: flex; gap: 0.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid #27272a; margin-bottom: 1rem; }
.tab-nav a { padding: 0.375rem 0.75rem; border-radius: 0.375rem; font-size: 0.75rem; font-weight: 500; color: #71717a; text-decoration: none; transition: all 0.15s; }
.tab-nav a:hover { color: #d4d4d8; background: rgba(39,39,42,0.5); }
.tab-nav a.active { background: #27272a; color: #e4e4e7; }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.375rem; padding: 0.375rem 0.75rem; border-radius: 0.375rem; font-size: 0.8125rem; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; text-decoration: none; white-space: nowrap; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: #6366f1; color: #fff; }

.btn-secondary { background: #3f3f46; color: #e4e4e7; }
.btn-secondary:hover { background: #52525b; }
.btn-outline { background: #27272a; border: 1px solid #3f3f46; color: #d4d4d8; }
.btn-outline:hover { background: #3f3f46; }
.btn-danger-outline { background: #27272a; border: 1px solid #3f3f46; color: #a1a1aa; }
.btn-danger-outline:hover { background: rgba(127,29,29,0.4); border-color: rgba(153,27,27,0.5); color: #f87171; }
.btn-sm { font-size: 0.75rem; padding: 0.375rem 0.75rem; }
.btn-block { width: 100%; }
.btn-blue { background: #2563eb; color: #fff; }
.btn-blue:hover { background: #3b82f6; }
.btn-amber { background: #d97706; color: #fff; }
.btn-amber:hover { background: #f59e0b; }
.btn-green { background: #059669; color: #fff; }
.btn-green:hover { background: #10b981; }

/* ── Forms (override Pico for compact forms) ── */
input, select, textarea { margin-bottom: 0 !important; }
form .form-group { margin-bottom: 0.75rem; }
form .form-group:last-child { margin-bottom: 0; }
label { font-size: 11px; font-weight: 500; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.375rem; display: block; }
.form-row { display: flex; align-items: flex-end; gap: 0.75rem; }
.form-row > * { flex: 1; }

/* ── Typography helpers ── */
.text-xs { font-size: 0.75rem; }
.text-sm { font-size: 0.875rem; }
.text-lg { font-size: 1.125rem; }
.text-xl { font-size: 1.25rem; }
.text-2xl { font-size: 1.5rem; }
.text-muted { color: #71717a; }
.text-dim { color: #52525b; }
.text-secondary { color: #a1a1aa; }
.text-light { color: #d4d4d8; }
.text-white { color: #f4f4f5; }
.text-primary { color: #818cf8; }
.text-green { color: #34d399; }
.text-blue { color: #60a5fa; }
.font-mono { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
.font-medium { font-weight: 500; }
.font-semibold { font-weight: 600; }
.tabular-nums { font-variant-numeric: tabular-nums; }
.uppercase { text-transform: uppercase; }
.tracking-wider { letter-spacing: 0.05em; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.whitespace-pre-wrap { white-space: pre-wrap; }
.line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.leading-relaxed { line-height: 1.625; }
.leading-snug { line-height: 1.375; }

/* ── Spacing / layout helpers ── */
.flex { display: flex; }
.flex-1 { flex: 1; min-width: 0; }
.flex-col { flex-direction: column; }
.flex-wrap { flex-wrap: wrap; }
.items-center { align-items: center; }
.items-start { align-items: start; }
.items-baseline { align-items: baseline; }
.justify-between { justify-content: space-between; }
.justify-center { justify-content: center; }
.justify-end { justify-content: flex-end; }
.gap-1 { gap: 0.25rem; }
.gap-1\.5 { gap: 0.375rem; }
.gap-2 { gap: 0.5rem; }
.gap-3 { gap: 0.75rem; }
.gap-4 { gap: 1rem; }
.gap-6 { gap: 1.5rem; }
.shrink-0 { flex-shrink: 0; }
.mb-1 { margin-bottom: 0.25rem; }
.mb-1\.5 { margin-bottom: 0.375rem; }
.mb-2 { margin-bottom: 0.5rem; }
.mb-3 { margin-bottom: 0.75rem; }
.mb-4 { margin-bottom: 1rem; }
.mb-5 { margin-bottom: 1.25rem; }
.mb-6 { margin-bottom: 1.5rem; }
.mb-8 { margin-bottom: 2rem; }
.mt-0\.5 { margin-top: 0.125rem; }
.mt-1 { margin-top: 0.25rem; }
.mt-1\.5 { margin-top: 0.375rem; }
.mt-2 { margin-top: 0.5rem; }
.mt-6 { margin-top: 1.5rem; }
.ml-1 { margin-left: 0.25rem; }
.pt-1 { padding-top: 0.25rem; }
.space-y-0\.5 > * + * { margin-top: 0.125rem; }
.space-y-1 > * + * { margin-top: 0.25rem; }
.space-y-1\.5 > * + * { margin-top: 0.375rem; }
.space-y-2 > * + * { margin-top: 0.5rem; }
.space-y-2\.5 > * + * { margin-top: 0.625rem; }
.space-y-3 > * + * { margin-top: 0.75rem; }
.space-y-4 > * + * { margin-top: 1rem; }
.space-y-6 > * + * { margin-top: 1.5rem; }
.w-14 { width: 3.5rem; }
.w-56 { width: 14rem; }
.hidden { display: none !important; }

/* ── Misc ── */
.avatar-sm { width: 2rem; height: 2rem; border-radius: 0.375rem; background: #18181b; border: 1px solid #3f3f46; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #a1a1aa; text-transform: uppercase; }
.avatar-md { width: 2.5rem; height: 2.5rem; border-radius: 0.5rem; background: #27272a; border: 1px solid #3f3f46; display: flex; align-items: center; justify-content: center; font-size: 0.875rem; font-weight: 600; color: #818cf8; text-transform: uppercase; }
.tag { display: inline-flex; padding: 0.125rem 0.375rem; background: rgba(24,24,27,0.8); color: #71717a; border-radius: 0.25rem; font-size: 11px; }
.tag-green { background: rgba(6,78,59,0.4); color: #10b981; }
.tag-blue { background: rgba(30,58,138,0.4); color: #3b82f6; }
.pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

.code-block { background: #09090b; border: 1px solid #27272a; border-radius: 0.5rem; padding: 1rem; overflow: auto; }
.stat-label { font-size: 11px; font-weight: 500; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; }
.stat-value { font-size: 1.5rem; font-weight: 600; color: #f4f4f5; font-variant-numeric: tabular-nums; }

.breadcrumb { display: flex; align-items: center; gap: 0.375rem; font-size: 0.75rem; margin-bottom: 1.25rem; }
.breadcrumb a { color: #71717a; text-decoration: none; transition: color 0.15s; }
.breadcrumb a:hover { color: #d4d4d8; }
.breadcrumb .sep { color: #3f3f46; }
.breadcrumb .current { color: #a1a1aa; }
.sidebar-panel { width: 14rem; flex-shrink: 0; }
.sidebar-panel .space-y-3 > * + * { margin-top: 0.75rem; }

/* ── Mobile ── */
.mobile-menu-btn { display: none; position: fixed; top: 1rem; left: 1rem; z-index: 50; padding: 0.5rem; background: #18181b; border: 1px solid #27272a; border-radius: 0.5rem; color: #a1a1aa; cursor: pointer; }

}

/* ── Toast animations ── */
.toast-container { position: fixed; bottom: 1rem; right: 1rem; z-index: 50; display: flex; flex-direction: column; gap: 0.5rem; max-width: 24rem; }
.toast-enter { animation: toastIn 0.3s cubic-bezier(0.21, 1.02, 0.73, 1) forwards; }
.toast-exit { animation: toastOut 0.2s ease-in forwards; }
@keyframes toastIn { from { transform: translateX(calc(100% + 1rem)); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(calc(100% + 1rem)); opacity: 0; } }

/* ── Command palette ── */
.palette-overlay { animation: overlayIn 0.15s ease-out; }
.palette-panel { animation: paletteIn 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes paletteIn { from { opacity: 0; transform: scale(0.95) translateY(-10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

/* ── Entrance animations ── */
.fade-in { animation: fadeIn 0.3s ease-out both; }
.slide-up { animation: slideUp 0.3s ease-out both; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ── Staggered children ── */
.stagger > * { animation: slideUp 0.3s ease-out both; }
.stagger > *:nth-child(1) { animation-delay: 0ms; }
.stagger > *:nth-child(2) { animation-delay: 30ms; }
.stagger > *:nth-child(3) { animation-delay: 60ms; }
.stagger > *:nth-child(4) { animation-delay: 90ms; }
.stagger > *:nth-child(5) { animation-delay: 120ms; }
.stagger > *:nth-child(n+6) { animation-delay: 150ms; }

/* ── Details chevron rotation ── */
details .chev { transition: transform 0.2s ease; }
details[open] .chev { transform: rotate(90deg); }

/* ── HTMX loading indicator ── */
.htmx-indicator { display: none; }
.htmx-request .htmx-indicator { display: inline-flex; }
.htmx-request.htmx-indicator { display: inline-flex; }

/* ── Loading spinner ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 14px; height: 14px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; }

/* ── HTMX swap transitions ── */
.htmx-settling { opacity: 0; }
.htmx-swapping { opacity: 0; transition: opacity 0.1s ease-out; }
.htmx-added { animation: fadeIn 0.2s ease-out; }

/* ── Skeleton loading pulse ── */
.skeleton { background: linear-gradient(90deg, rgba(39,39,42,0.5) 25%, rgba(63,63,70,0.3) 50%, rgba(39,39,42,0.5) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── Smooth scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(63,63,70,0.5); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(82,82,91,0.7); }

/* ── Focus ring ── */
.focus-ring:focus-visible { outline: none; box-shadow: 0 0 0 2px #18181b, 0 0 0 4px rgba(99,102,241,0.5); }
</style>

        </a>
        <a href="/work-blocks">
          <svg class="icon-sm" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
          Work Blocks
        </a>
        <a href="/agents">
          <svg class="icon-sm" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Agents
        </a>
      </div>
      <div class="sidebar-footer">
        <button onclick="togglePalette()">
          <kbd>&#8984;K</kbd>
          Search
        </button>
      </div>
    </nav>
    {{end}}

    {{define "foot"}}
    <!-- Toast container -->
    <div id="toasts" class="toast-container"></div>

    <!-- Command palette -->
    <div id="palette" class="hidden" style="position:fixed;inset:0;z-index:50;" onclick="if(event.target===this)closePalette()">
      <div id="palette-overlay" class="palette-overlay" style="position:absolute;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);"></div>
      <div id="palette-panel" class="palette-panel" style="position:relative;margin:6rem auto 0;width:100%;max-width:32rem;background:#18181b;border-radius:0.5rem;border:1px solid #3f3f46;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);overflow:hidden;">
        <input id="palette-input" type="text"
          aria-label="Search issues and agents"
          placeholder="Search issues and agents..."
          class="focus-ring"
          style="width:100%;padding:0.75rem 1rem;background:transparent;color:#f4f4f5;font-size:0.875rem;outline:none;border:none;border-bottom:1px solid #27272a;"
          oninput="searchPalette(this.value)" onkeydown="paletteNav(event)">
        <div id="palette-results" style="max-height:18rem;overflow-y:auto;padding:0.25rem 0;"></div>
      </div>
    </div>

    <script>
/* HTML escape helper */
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* SSE connection */
let sse;
function connectSSE() {
  sse = new EventSource('/events');
  sse.addEventListener('comment', e => {
    const d = JSON.parse(e.data);
    showToast(d.author + ' on ' + d.issue_key, d.body.substring(0, 80), '/issues/' + d.issue_key);
  });
  sse.addEventListener('run_complete', e => {
    const d = JSON.parse(e.data);
    showToast('Run ' + d.status, 'Run ' + d.run_id.substring(0, 8) + ' ' + d.status, '/runs/' + d.run_id);
  });
  sse.onerror = () => { sse.close(); setTimeout(connectSSE, 3000); };
}
connectSSE();

/* Toast with slide-out dismiss */
function showToast(title, body, href) {
  const el = document.createElement('div');
  el.className = 'toast-enter card';
  el.style.cssText = 'cursor:pointer;padding:0.75rem;';
  el.innerHTML = '<div class="flex items-start justify-between gap-2"><div><div class="toast-title text-xs font-medium text-light"></div><div class="toast-body text-xs text-muted mt-0\\.5"></div></div>' +
    '<button style="background:none;border:none;color:#52525b;cursor:pointer;font-size:0.875rem;padding:0;" onclick="event.stopPropagation();dismissToast(this.closest(\'.toast-enter\'))">&times;</button></div>' +
    '<div style="margin-top:0.5rem;height:1px;background:#3f3f46;border-radius:9999px;overflow:hidden;"><div style="animation:shrink 5s linear forwards;height:100%;background:rgba(99,102,241,0.5);"></div></div>';
  el.querySelector('.toast-title').textContent = title;
  el.querySelector('.toast-body').textContent = body;
  if (href) el.onclick = () => window.location.href = href;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => dismissToast(el), 5000);
}
function dismissToast(el) {
  if (!el || !el.parentNode) return;
  el.classList.remove('toast-enter');
  el.classList.add('toast-exit');
  el.addEventListener('animationend', () => el.remove(), { once: true });
}

/* Command palette */
let paletteTrigger = null;
function openPalette() {
  paletteTrigger = document.activeElement;
  const p = document.getElementById('palette');
  p.classList.remove('hidden');
  document.getElementById('palette-input').focus();
  document.getElementById('palette-input').value = '';
  document.getElementById('palette-results').innerHTML = '';
}
function closePalette() {
  const p = document.getElementById('palette');
  if (p.classList.contains('hidden')) return;
  const panel = document.getElementById('palette-panel');
  panel.style.animation = 'none';
  panel.offsetHeight;
  panel.style.animation = 'paletteIn 0.15s ease-in reverse forwards';
  panel.addEventListener('animationend', () => {
    p.classList.add('hidden');
    panel.style.animation = '';
    if (paletteTrigger && paletteTrigger.focus) paletteTrigger.focus();
    paletteTrigger = null;
  }, { once: true });
}
function togglePalette() {
  document.getElementById('palette').classList.contains('hidden') ? openPalette() : closePalette();
}
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); togglePalette(); }
  if (e.key === 'Escape') closePalette();
});

let palIdx = -1;
async function searchPalette(q) {
  palIdx = -1;
  if (!q) { document.getElementById('palette-results').innerHTML = ''; return; }
  const res = await fetch('/search?q=' + encodeURIComponent(q));
  const items = await res.json();
  let html = '';
  (items || []).forEach((it, i) => {
    const icon = it.type === 'issue' ? '&#9633;' : '&#9678;';
    html += '<a href="' + escapeHtml(it.url) + '" class="pal-item" style="display:flex;align-items:center;gap:0.5rem;padding:0.5rem 1rem;font-size:0.875rem;color:#d4d4d8;text-decoration:none;border-radius:0.375rem;margin:0 0.25rem;transition:background 0.15s;" data-idx="' + i + '">' +
      '<span class="text-muted">' + icon + '</span><span class="font-mono text-xs text-secondary">' + escapeHtml(it.key) + '</span><span>' + escapeHtml(it.title) + '</span></a>';
  });
  html += '<div style="border-top:1px solid #27272a;margin-top:0.25rem;padding-top:0.25rem;"><a href="/issues" data-create-title="" class="pal-item" style="display:flex;align-items:center;gap:0.5rem;padding:0.5rem 1rem;font-size:0.875rem;color:#a1a1aa;text-decoration:none;border-radius:0.375rem;margin:0 0.25rem;transition:background 0.15s;"><span class="text-primary">+</span> Create issue</a></div>';
  const container = document.getElementById('palette-results');
  container.innerHTML = html;
  const createLink = container.querySelector('[data-create-title]');
  if (createLink) {
    createLink.dataset.createTitle = q;
    createLink.addEventListener('click', function(e) { e.preventDefault(); createFromPalette(this.dataset.createTitle); });
  }
}
function createFromPalette(title) {
  const form = document.createElement('form');
  form.method = 'POST'; form.action = '/issues';
  const input = document.createElement('input');
  input.name = 'title'; input.value = title;
  form.appendChild(input); document.body.appendChild(form); form.submit();
}
function paletteNav(e) {
  const items = document.querySelectorAll('.pal-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); palIdx = Math.min(palIdx + 1, items.length - 1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); palIdx = Math.max(palIdx - 1, 0); }
  else if (e.key === 'Enter' && palIdx >= 0) { e.preventDefault(); items[palIdx].click(); return; }
  items.forEach((el, i) => {
    el.style.background = i === palIdx ? '#27272a' : '';
    el.style.color = i === palIdx ? '#f4f4f5' : '';
  });
  if (palIdx >= 0) items[palIdx].scrollIntoView({ block: 'nearest' });
}

/* HTMX loading indicators */
document.addEventListener('htmx:beforeRequest', function(e) {
  const indicator = e.target.querySelector('.htmx-indicator');
  if (indicator) indicator.style.display = 'inline-flex';
});
document.addEventListener('htmx:afterRequest', function(e) {
  const indicator = e.target.querySelector('.htmx-indicator');
  if (indicator) indicator.style.display = 'none';
});

/* Auto-scroll stdout container on HTMX swap */
document.addEventListener('htmx:afterSwap', function(e) {
  if (e.target.id === 'stdout-container') {
    const el = e.target;
    const isNearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 100;
    if (isNearBottom) el.scrollTop = el.scrollHeight;
  }
});

/* Mobile nav toggle */
function toggleMobileNav() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mobile-nav-overlay').classList.toggle('open');
}
function closeMobileNav() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobile-nav-overlay').classList.remove('open');
}

/* Toast progress bar shrink animation (injected dynamically) */
if (!document.getElementById('toast-progress-style')) {
  const s = document.createElement('style');
  s.id = 'toast-progress-style';
  s.textContent = '@keyframes shrink { from { width: 100%; } to { width: 0%; } }';
  document.head.appendChild(s);
}

/* A11Y: Mark active nav link with aria-current */
(function() {
  const path = window.location.pathname;
  document.querySelectorAll('#sidebar a[href]').forEach(a => {
    const href = a.getAttribute('href');
    if (path === href || (href !== '/dashboard' && path.startsWith(href))) {
      a.setAttribute('aria-current', 'page');
    }
  });
})();

/* UX: Flash messages from URL params */
(function() {
  const params = new URLSearchParams(window.location.search);
  const flash = params.get('flash');
  const msg = params.get('msg');
  if (flash && msg) {
    showToast(flash === 'error' ? 'Error' : 'Success', msg);
    params.delete('flash');
    params.delete('msg');
    const clean = params.toString();
    const url = window.location.pathname + (clean ? '?' + clean : '');
    window.history.replaceState({}, '', url);
  }
})();
</script>
  </body>
</html>
{{end}}

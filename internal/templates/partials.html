    <script>
    function updateModels(runnerSelectId, modelSelectId) {
        const runnerEl = document.getElementById(runnerSelectId);
        if (!runnerEl) return;
        const runner = runnerEl.value;
        const modelSelect = document.getElementById(modelSelectId);
        if (!modelSelect) return;
        const currentModel = modelSelect.dataset.current;
        const defaultLabel = modelSelect.dataset.defaultLabel;
        modelSelect.innerHTML = '';

        if (defaultLabel) {
            const defaultOpt = document.createElement('option');
            defaultOpt.value = '';
            defaultOpt.textContent = defaultLabel;
            if (!currentModel) defaultOpt.selected = true;
            modelSelect.appendChild(defaultOpt);
        }

        let models = [];
        if (runner === 'claude_code') {

            models = [
                {val: 'sonnet', label: 'Sonnet'},
                {val: 'opus', label: 'Opus'},
                {val: 'haiku', label: 'Haiku'}
            ];
        } else if (runner === 'codex') {
            models = [
                {val: 'gpt-4o', label: 'gpt-4o'},
                {val: 'o4-mini', label: 'o4-mini'}
            ];
        } else if (runner === 'antigravity') {
            models = [
                {val: 'default', label: 'Default'}
            ];
        } else if (runner === 'gemini') {
            models = [
                {val: 'gemini-2.0-flash', label: 'Gemini 2.0 Flash'},
                {val: 'gemini-2.0-flash-lite', label: 'Gemini 2.0 Flash Lite'},
                {val: 'gemini-1.5-pro', label: 'Gemini 1.5 Pro'},
                {val: 'gemini-1.5-flash', label: 'Gemini 1.5 Flash'}
            ];
        }

        models.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m.val;
            opt.textContent = m.label;
            if (m.val === currentModel) opt.selected = true;
            modelSelect.appendChild(opt);
        });
    }
    </script>

:root {
  --c-pg: 249 248 243; --c-card: 255 255 255; --c-sf: 241 239 238; --c-bd: 223 223 221;

}

body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }

/* Activity heatmap */
.heatmap-0 { background: rgb(var(--c-sf)); }
.heatmap-1 { background: rgb(var(--c-ac) / 0.25); }
.heatmap-2 { background: rgb(var(--c-ac) / 0.50); }
.heatmap-3 { background: rgb(var(--c-ac) / 0.75); }
.heatmap-4 { background: rgb(var(--c-ac)); }

/* Toast animations */
.toast-enter { animation: toastIn 0.3s cubic-bezier(0.21, 1.02, 0.73, 1) forwards; }
.toast-exit { animation: toastOut 0.2s ease-in forwards; }
@keyframes toastIn { from { transform: translateX(calc(100% + 1rem)); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(calc(100% + 1rem)); opacity: 0; } }

/* Command palette */
.palette-overlay { animation: overlayIn 0.15s ease-out; }
.palette-panel { animation: paletteIn 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes paletteIn { from { opacity: 0; transform: scale(0.95) translateY(-10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

/* Entrance animations */
.fade-in { animation: fadeIn 0.3s ease-out both; }
.slide-up { animation: slideUp 0.3s ease-out both; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Staggered children */
.stagger > * { animation: slideUp 0.3s ease-out both; }
.stagger > *:nth-child(1) { animation-delay: 0ms; }
.stagger > *:nth-child(2) { animation-delay: 30ms; }
.stagger > *:nth-child(3) { animation-delay: 60ms; }
.stagger > *:nth-child(4) { animation-delay: 90ms; }
.stagger > *:nth-child(5) { animation-delay: 120ms; }
.stagger > *:nth-child(n+6) { animation-delay: 150ms; }

/* Details chevron rotation */
details .chev { transition: transform 0.2s ease; }
details[open] .chev { transform: rotate(90deg); }

/* HTMX loading indicator */
.htmx-indicator { display: none; }
.htmx-request .htmx-indicator { display: inline-flex; }
.htmx-request.htmx-indicator { display: inline-flex; }

/* Loading spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 14px; height: 14px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; }

/* HTMX swap transitions */
.htmx-settling { opacity: 0; }
.htmx-swapping { opacity: 0; transition: opacity 0.1s ease-out; }
.htmx-added { animation: fadeIn 0.2s ease-out; }

/* Skeleton loading pulse */
.skeleton { background: linear-gradient(90deg, rgb(var(--c-sf)) 25%, rgb(var(--c-pg)) 50%, rgb(var(--c-sf)) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Smooth scrollbar for dark theme */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgb(var(--c-bd)); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgb(var(--c-ink3) / 0.3); }

/* Focus ring */
.focus-ring:focus-visible { outline: none; box-shadow: 0 0 0 2px rgb(var(--c-pg)), 0 0 0 4px rgb(var(--c-ac) / 0.6); }

/* Diff syntax highlighting: let hljs colors override diff row text colors */
td.diff-code { color: #d4d4d8; }
td.diff-code .hljs-keyword, td.diff-code .hljs-selector-tag, td.diff-code .hljs-built_in { color: #f47067; }
td.diff-code .hljs-string, td.diff-code .hljs-attr { color: #96d0ff; }
td.diff-code .hljs-comment { color: #768390; }
td.diff-code .hljs-function, td.diff-code .hljs-title { color: #dcbdfb; }
td.diff-code .hljs-number, td.diff-code .hljs-literal { color: #6cb6ff; }
td.diff-code .hljs-type, td.diff-code .hljs-title.class_ { color: #f69d50; }
</style>

    <script>
/* HTML escape helper */
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* SSE connection */
let sse;
function connectSSE() {
  sse = new EventSource('/events');
  sse.addEventListener('comment', e => {
    const d = JSON.parse(e.data);
    showToast(d.author + ' on ' + d.issue_key, d.body.substring(0, 80), '/issues/' + d.issue_key);
    document.body.dispatchEvent(new CustomEvent('issue-changed', {detail: {key: d.issue_key}}));
  });
  sse.addEventListener('issue_created', e => {
    const d = JSON.parse(e.data);
    showToast('Issue Created', d.key + ': ' + d.title, '/issues/' + d.key);
    if (d.warnings && d.warnings.length > 0) {
      d.warnings.forEach(w => showToast('Warning', w, '/issues/' + d.key));
    }
    document.body.dispatchEvent(new CustomEvent('issue-changed', {detail: {key: d.key}}));
  });
  sse.addEventListener('issue_updated', e => {
    const d = JSON.parse(e.data);
    showToast('Issue Updated', d.key + ' is now ' + d.status, '/issues/' + d.key);
    if (d.warnings && d.warnings.length > 0) {
      d.warnings.forEach(w => showToast('Warning', w, '/issues/' + d.key));
    }
    document.body.dispatchEvent(new CustomEvent('issue-changed', {detail: {key: d.key}}));
  });
  sse.addEventListener('issue_deleted', e => {
    const d = JSON.parse(e.data);
    showToast('Issue Deleted', d.key);
    document.body.dispatchEvent(new CustomEvent('issue-changed', {detail: {key: d.key}}));
  });
  sse.addEventListener('agent_created', e => {
    const d = JSON.parse(e.data);
    showToast('Agent Created', d.name, '/agents/' + d.slug);
    document.body.dispatchEvent(new CustomEvent('agent-changed', {detail: d}));
  });
  sse.addEventListener('agent_updated', e => {
    const d = JSON.parse(e.data);
    document.body.dispatchEvent(new CustomEvent('agent-changed', {detail: d}));
  });
  sse.addEventListener('run_complete', e => {
    const d = JSON.parse(e.data);
    showToast('Run ' + d.status, 'Run ' + d.run_id.substring(0, 8) + ' ' + d.status, '/runs/' + d.run_id);
    document.body.dispatchEvent(new CustomEvent('run-complete', {detail: d}));
  });
  sse.addEventListener('run_started', e => {
    const d = JSON.parse(e.data);
    document.body.dispatchEvent(new CustomEvent('run-started', {detail: d}));
  });
  sse.onerror = () => { sse.close(); setTimeout(connectSSE, 3000); };
}
connectSSE();

/* Toast with slide-out dismiss */
function showToast(title, body, href) {
  const el = document.createElement('div');
  el.className = 'toast-enter bg-card border border-bd rounded-lg p-3 shadow-lg cursor-pointer hover:bg-sf transition-colors';
  el.innerHTML = '<div class="flex items-start justify-between gap-2"><div><div class="toast-title text-xs font-medium text-ink"></div><div class="toast-body text-xs text-ink3 mt-0.5"></div></div>' +
    '<button class="text-ink3/40 hover:text-ink3 transition-colors text-sm leading-none mt-0.5" onclick="event.stopPropagation();dismissToast(this.closest(\'[class*=toast]\'))">&times;</button></div>' +
    '<div class="toast-progress mt-2 h-px bg-bd rounded-full overflow-hidden"><div style="animation:shrink 5s linear forwards" class="h-full bg-ac/50"></div></div>';
  el.querySelector('.toast-title').textContent = title;
  el.querySelector('.toast-body').textContent = body;
  if (href) el.onclick = () => window.location.href = href;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => dismissToast(el), 5000);
}
function dismissToast(el) {
  if (!el || !el.parentNode) return;
  el.classList.remove('toast-enter');
  el.classList.add('toast-exit');
  el.addEventListener('animationend', () => el.remove(), { once: true });
}

/* Command palette */
let paletteTrigger = null;
function openPalette() {
  paletteTrigger = document.activeElement;
  const p = document.getElementById('palette');
  p.classList.remove('hidden');
  document.getElementById('palette-input').focus();
  document.getElementById('palette-input').value = '';
  document.getElementById('palette-results').innerHTML = '';
}
function closePalette() {
  const p = document.getElementById('palette');
  if (p.classList.contains('hidden')) return;
  const panel = document.getElementById('palette-panel');
  panel.style.animation = 'none';
  panel.offsetHeight;
  panel.style.animation = 'paletteIn 0.15s ease-in reverse forwards';
  panel.addEventListener('animationend', () => {
    p.classList.add('hidden');
    panel.style.animation = '';
    if (paletteTrigger && paletteTrigger.focus) paletteTrigger.focus();
    paletteTrigger = null;
  }, { once: true });
}
function togglePalette() {
  document.getElementById('palette').classList.contains('hidden') ? openPalette() : closePalette();
}
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); togglePalette(); }
  if (e.key === 'Escape') { if (!document.getElementById('confirm-modal').classList.contains('hidden')) closeConfirm(false); else closePalette(); }
});

let palIdx = -1;
async function searchPalette(q) {
  palIdx = -1;
  if (!q) { document.getElementById('palette-results').innerHTML = ''; return; }
  const res = await fetch('/search?q=' + encodeURIComponent(q));
  const items = await res.json();
  let html = '';
  (items || []).forEach((it, i) => {
    const icon = it.type === 'issue' ? '&#9633;' : '&#9678;';
    html += '<a href="' + escapeHtml(it.url) + '" class="pal-item flex items-center gap-2 px-4 py-2 text-sm text-ink2 hover:bg-sf rounded-md mx-1 transition-colors" data-idx="' + i + '">' +
      '<span class="text-ink3/50">' + icon + '</span><span class="text-ink3 font-mono text-xs">' + escapeHtml(it.key) + '</span><span>' + escapeHtml(it.title) + '</span></a>';
  });
  html += '<div class="border-t border-bd mt-1 pt-1"><a href="/issues" data-create-title="" class="pal-item flex items-center gap-2 px-4 py-2 text-sm text-ink3 hover:bg-sf rounded-md mx-1 transition-colors"><span class="text-ac-t">+</span> Create issue</a></div>';
  const container = document.getElementById('palette-results');
  container.innerHTML = html;
  const createLink = container.querySelector('[data-create-title]');
  if (createLink) {
    createLink.dataset.createTitle = q;
    createLink.addEventListener('click', function(e) { e.preventDefault(); createFromPalette(this.dataset.createTitle); });
  }
}
function createFromPalette(title) {
  const form = document.createElement('form');
  form.method = 'POST'; form.action = '/issues';
  const input = document.createElement('input');
  input.name = 'title'; input.value = title;
  form.appendChild(input); document.body.appendChild(form); form.submit();
}
function paletteNav(e) {
  const items = document.querySelectorAll('.pal-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); palIdx = Math.min(palIdx + 1, items.length - 1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); palIdx = Math.max(palIdx - 1, 0); }
  else if (e.key === 'Enter' && palIdx >= 0) { e.preventDefault(); items[palIdx].click(); return; }
  items.forEach((el, i) => {
    el.classList.toggle('bg-sf', i === palIdx);
    el.classList.toggle('text-ink', i === palIdx);
  });
  if (palIdx >= 0) items[palIdx].scrollIntoView({ block: 'nearest' });
}

/* HTMX loading indicators */
document.addEventListener('htmx:beforeRequest', function(e) {
  const indicator = e.target.querySelector('.htmx-indicator');
  if (indicator) indicator.style.display = 'inline-flex';
});
document.addEventListener('htmx:afterRequest', function(e) {
  const indicator = e.target.querySelector('.htmx-indicator');
  if (indicator) indicator.style.display = 'none';
});

/* Auto-scroll stdout container on HTMX swap */
document.addEventListener('htmx:afterSwap', function(e) {
  if (e.target.id === 'stdout-container') {
    const el = e.target;
    const isNearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 100;
    if (isNearBottom) el.scrollTop = el.scrollHeight;
  }
});

/* Mobile nav toggle */
function toggleMobileNav() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('mobile-nav-overlay');
  sidebar.classList.toggle('-translate-x-full');
  overlay.classList.toggle('hidden');
}
function closeMobileNav() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('mobile-nav-overlay');
  sidebar.classList.add('-translate-x-full');
  overlay.classList.add('hidden');
}

/* Toast progress bar shrink animation (injected dynamically) */
if (!document.getElementById('toast-progress-style')) {
  const s = document.createElement('style');
  s.id = 'toast-progress-style';
  s.textContent = '@keyframes shrink { from { width: 100%; } to { width: 0%; } }';
  document.head.appendChild(s);
}

/* Diff syntax highlighting */
(function() {
  if (typeof hljs === 'undefined') return;
  var extMap = {go:'go',py:'python',js:'javascript',ts:'typescript',jsx:'javascript',tsx:'typescript',html:'xml',css:'css',sql:'sql',sh:'bash',yml:'yaml',yaml:'yaml',json:'json',rs:'rust',rb:'ruby',java:'java',kt:'kotlin',swift:'swift',c:'c',cpp:'cpp',h:'c',hpp:'cpp',toml:'ini',xml:'xml',proto:'protobuf',md:'markdown',tf:'hcl'};
  function langFromPath(p) { var ext = p.split('.').pop(); return extMap[ext] || null; }
  document.querySelectorAll('table').forEach(function(table) {
    var groups = [], cur = null;
    table.querySelectorAll('tr').forEach(function(tr) {
      var tds = tr.querySelectorAll('td');
      if (tds.length < 4) return;
      var contentTd = tds[3];
      var cls = tr.className;
      if (cls.indexOf('font-medium') !== -1) {
        var m = contentTd.textContent.match(/diff --git a\/(.+?) b\//);
        if (m) { cur = {lang: langFromPath(m[1]), rows: []}; groups.push(cur); }
        return;
      }
      if (cls.indexOf('text-indigo-400') !== -1) return;
      if (cur && cur.lang) cur.rows.push(contentTd);
    });
    groups.forEach(function(g) {
      if (!g.lang || !g.rows.length) return;
      var code = g.rows.map(function(td) { return td.textContent; }).join('\n');
      try {
        var result = hljs.highlight(code, {language: g.lang, ignoreIllegals: true});
        var lines = result.value.split('\n');
        g.rows.forEach(function(td, i) { if (lines[i] !== undefined) td.innerHTML = lines[i]; });
      } catch(e) {}
    });
  });
})();

/* Confirm modal */
let _confirmResolve = null;
function showConfirm(message, {variant = 'danger'} = {}) {
  return new Promise(resolve => {
    _confirmResolve = resolve;
    const modal = document.getElementById('confirm-modal');
    document.getElementById('confirm-message').textContent = message;
    const btn = document.getElementById('confirm-ok');
    btn.className = variant === 'danger'
      ? 'px-4 py-2 text-sm font-medium rounded-md bg-red-600 hover:bg-red-500 text-white transition-colors'
      : 'px-4 py-2 text-sm font-medium rounded-md bg-emerald-600 hover:bg-emerald-500 text-white transition-colors';
    btn.textContent = variant === 'danger' ? 'Delete' : 'Confirm';
    modal.classList.remove('hidden');
    modal.querySelector('.confirm-panel').style.animation = 'paletteIn 0.15s cubic-bezier(0.16,1,0.3,1) forwards';
    btn.focus();
  });
}
function closeConfirm(result) {
  const modal = document.getElementById('confirm-modal');
  const panel = modal.querySelector('.confirm-panel');
  panel.style.animation = 'paletteIn 0.1s ease-in reverse forwards';
  panel.addEventListener('animationend', () => {
    modal.classList.add('hidden');
    panel.style.animation = '';
    if (_confirmResolve) { _confirmResolve(result); _confirmResolve = null; }
  }, { once: true });
}
function confirmSubmit(form, message, opts) {
  showConfirm(message, opts).then(ok => { if (ok) form.submit(); });
  return false;
}

/* A11Y: Mark active nav link with aria-current */
(function() {
  const path = window.location.pathname;
  document.querySelectorAll('#sidebar a[href]').forEach(a => {
    const href = a.getAttribute('href');
    if (path === href || (href !== '/dashboard' && path.startsWith(href))) {
      a.setAttribute('aria-current', 'page');
      a.classList.add('bg-sf', 'text-ink');
    }
  });
})();

/* UX: Flash messages from URL params */
(function() {
  const params = new URLSearchParams(window.location.search);
  const flash = params.get('flash');
  const msg = params.get('msg');
  if (flash && msg) {
    showToast(flash === 'error' ? 'Error' : 'Success', msg);
    params.delete('flash');
    params.delete('msg');
    const clean = params.toString();
    const url = window.location.pathname + (clean ? '?' + clean : '');
    window.history.replaceState({}, '', url);
  }
})();

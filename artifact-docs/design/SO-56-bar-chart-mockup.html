<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SO-56 — Issues Per Day Bar Chart Mockup</title>
<style>
/* --- design system tokens (mirrored from partials.html) --- */
:root {
  --c-pg:   249 248 243;
  --c-card: 255 255 255;
  --c-sf:   241 239 238;
  --c-bd:   223 223 221;
  --c-ink:  20 18 17;
  --c-ink2: 51 49 47;
  --c-ink3: 48 47 45;
  --c-ac:   122 223 156;
  --c-ac-t: 0 159 96;
}
:root.dark {
  --c-pg:   9 9 11;
  --c-card: 24 24 27;
  --c-sf:   39 39 42;
  --c-bd:   39 39 42;
  --c-ink:  228 228 231;
  --c-ink2: 212 212 216;
  --c-ink3: 161 161 170;
  --c-ac:   79 70 229;
  --c-ac-t: 129 140 248;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 13px;
  background: rgb(var(--c-pg));
  color: rgb(var(--c-ink));
  padding: 32px;
}

/* --- theme toggle --- */
.toggle-row {
  display: flex; gap: 8px; margin-bottom: 24px;
}
.toggle-btn {
  padding: 4px 12px;
  border: 1px solid rgb(var(--c-bd));
  border-radius: 6px;
  background: rgb(var(--c-card));
  color: rgb(var(--c-ink2));
  cursor: pointer;
  font-size: 11px;
}
.toggle-btn.active {
  background: rgb(var(--c-ac));
  border-color: rgb(var(--c-ac));
  color: rgb(var(--c-ink));
}

/* --- card wrapper --- */
.chart-card {
  background: rgb(var(--c-card));
  border: 1px solid rgb(var(--c-bd));
  border-radius: 8px;
  padding: 20px 20px 16px;
  max-width: 820px;
}

/* --- header row --- */
.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.chart-title {
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: rgb(var(--c-ink3) / 0.5);
}
.chart-legend {
  display: flex; gap: 12px; align-items: center;
}
.legend-item {
  display: flex; gap: 5px; align-items: center;
  font-size: 11px; color: rgb(var(--c-ink3) / 0.6);
}
.legend-swatch {
  width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
}
.legend-swatch.created  { background: rgb(var(--c-sf)); border: 1px solid rgb(var(--c-bd)); }
.legend-swatch.completed { background: rgb(var(--c-ac)); }

/* --- chart body --- */
.chart-body {
  display: flex;
  align-items: flex-end;
  gap: 0;
  height: 120px;           /* chart area height */
  position: relative;
  border-bottom: 1px solid rgb(var(--c-bd));
  padding-bottom: 0;
}

/* horizontal gridlines via repeating-linear-gradient */
.chart-body::before {
  content: '';
  position: absolute;
  inset: 0 0 0 0;
  background: repeating-linear-gradient(
    to top,
    rgb(var(--c-bd) / 0.4) 0px,
    rgb(var(--c-bd) / 0.4) 1px,
    transparent 1px,
    transparent calc(120px / 4)   /* 4 grid bands */
  );
  pointer-events: none;
  z-index: 0;
}

/* --- day column --- */
.day-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  gap: 2px;
  position: relative;
  height: 100%;
  z-index: 1;
}

/* hover highlight */
.day-col:hover .day-highlight {
  opacity: 1;
}
.day-highlight {
  position: absolute;
  inset: 0 2px 0 2px;
  background: rgb(var(--c-ink) / 0.03);
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.15s;
  pointer-events: none;
}

/* --- bar pair: side-by-side within a day --- */
.bar-pair {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  width: 100%;
  padding: 0 3px;
  height: 100%;
  justify-content: center;
}

/* individual bar */
.bar {
  flex: 1;
  max-width: 14px;
  border-radius: 3px 3px 0 0;
  min-height: 2px;
  position: relative;
  transition: filter 0.1s;
  cursor: default;
}
.bar.created {
  background: rgb(var(--c-sf));
  border: 1px solid rgb(var(--c-bd));
  border-bottom: none;
}
.bar.completed {
  background: rgb(var(--c-ac));
}
.bar:hover { filter: brightness(0.9); }

/* --- tooltip --- */
.bar-tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
  background: rgb(var(--c-ink));
  color: rgb(var(--c-pg));
  font-size: 10px;
  padding: 3px 7px;
  border-radius: 4px;
  z-index: 10;
  pointer-events: none;
  line-height: 1.5;
}
.bar-tooltip::after {
  content: '';
  position: absolute;
  top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 4px solid transparent;
  border-top-color: rgb(var(--c-ink));
}
.bar:hover .bar-tooltip { display: block; }

/* --- x-axis labels --- */
.x-axis {
  display: flex;
  gap: 0;
  margin-top: 6px;
}
.x-label {
  flex: 1;
  text-align: center;
  font-size: 9px;
  color: rgb(var(--c-ink3) / 0.45);
  letter-spacing: 0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* --- y-axis ticks (absolute positioned beside the chart) --- */
.chart-area {
  display: flex;
  gap: 8px;
}
.y-ticks {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 120px;
  padding-bottom: 0;
}
.y-tick {
  font-size: 9px;
  color: rgb(var(--c-ink3) / 0.4);
  line-height: 1;
  text-align: right;
  width: 18px;
}

/* --- totals bar (summary row) --- */
.summary-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid rgb(var(--c-bd));
}
.summary-stat {
  display: flex; flex-direction: column; gap: 1px;
}
.summary-value {
  font-size: 18px;
  font-weight: 600;
  color: rgb(var(--c-ink));
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.summary-label {
  font-size: 10px;
  color: rgb(var(--c-ink3) / 0.5);
}
.summary-divider {
  width: 1px; height: 28px;
  background: rgb(var(--c-bd));
}
</style>
</head>
<body>

<div class="toggle-row">
  <button class="toggle-btn active" onclick="setTheme('light', this)">Light</button>
  <button class="toggle-btn" onclick="setTheme('dark', this)">Dark</button>
</div>

<!-- ============================================================
     COMPONENT: Issues Per Day Bar Chart
     Replaces the 48h heatmap on /activity
     Data: last 14 days, two series — created / completed
     ============================================================ -->
<div class="chart-card">

  <div class="chart-header">
    <span class="chart-title">Issues per day — last 14 days</span>
    <div class="chart-legend">
      <div class="legend-item">
        <div class="legend-swatch created"></div>
        Created
      </div>
      <div class="legend-item">
        <div class="legend-swatch completed"></div>
        Completed
      </div>
    </div>
  </div>

  <div class="chart-area">
    <!-- y-axis ticks: rendered top → bottom (max → 0) -->
    <div class="y-ticks" id="yTicks"></div>

    <div style="flex:1">
      <div class="chart-body" id="chartBody"></div>
      <div class="x-axis"    id="xAxis"></div>
    </div>
  </div>

  <!-- Summary totals (14-day window) -->
  <div class="summary-row">
    <div class="summary-stat">
      <span class="summary-value" id="totalCreated">—</span>
      <span class="summary-label">created</span>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-stat">
      <span class="summary-value" id="totalCompleted">—</span>
      <span class="summary-label">completed</span>
    </div>
  </div>

</div>

<script>
/* Sample data — 14 days ending today (2026-04-02) */
const DATA = [
  { label: 'Mar 20', created: 2,  completed: 1  },
  { label: 'Mar 21', created: 5,  completed: 3  },
  { label: 'Mar 22', created: 3,  completed: 4  },
  { label: 'Mar 23', created: 0,  completed: 0  },
  { label: 'Mar 24', created: 1,  completed: 2  },
  { label: 'Mar 25', created: 4,  completed: 5  },
  { label: 'Mar 26', created: 6,  completed: 4  },
  { label: 'Mar 27', created: 8,  completed: 6  },
  { label: 'Mar 28', created: 3,  completed: 7  },
  { label: 'Mar 29', created: 5,  completed: 3  },
  { label: 'Mar 30', created: 9,  completed: 8  },
  { label: 'Mar 31', created: 4,  completed: 6  },
  { label: 'Apr  1', created: 7,  completed: 5  },
  { label: 'Apr  2', created: 3,  completed: 2  },
];

const CHART_H = 120; /* px — must match CSS */
const Y_TICKS = 4;

function render() {
  const allVals = DATA.flatMap(d => [d.created, d.completed]);
  const max = Math.max(...allVals, 1);
  /* round max up to nearest nice number */
  const niceMax = Math.ceil(max / Y_TICKS) * Y_TICKS;

  /* y-axis ticks */
  const yEl = document.getElementById('yTicks');
  yEl.innerHTML = '';
  for (let i = Y_TICKS; i >= 0; i--) {
    const v = Math.round((niceMax / Y_TICKS) * i);
    const tick = document.createElement('div');
    tick.className = 'y-tick';
    tick.textContent = i === Y_TICKS ? v : (i === 0 ? '0' : v);
    yEl.appendChild(tick);
  }

  /* bars */
  const body = document.getElementById('chartBody');
  const xAxis = document.getElementById('xAxis');
  body.innerHTML = '';
  xAxis.innerHTML = '';

  let totalCreated = 0, totalCompleted = 0;

  DATA.forEach((d, i) => {
    totalCreated   += d.created;
    totalCompleted += d.completed;

    const createdH   = Math.max(d.created   / niceMax * CHART_H, d.created   > 0 ? 2 : 0);
    const completedH = Math.max(d.completed / niceMax * CHART_H, d.completed > 0 ? 2 : 0);

    /* day column */
    const col = document.createElement('div');
    col.className = 'day-col';

    const highlight = document.createElement('div');
    highlight.className = 'day-highlight';
    col.appendChild(highlight);

    const pair = document.createElement('div');
    pair.className = 'bar-pair';

    /* created bar */
    const bc = document.createElement('div');
    bc.className = 'bar created';
    bc.style.height = createdH + 'px';
    const tc = document.createElement('div');
    tc.className = 'bar-tooltip';
    tc.textContent = `Created: ${d.created}`;
    bc.appendChild(tc);
    pair.appendChild(bc);

    /* completed bar */
    const bcp = document.createElement('div');
    bcp.className = 'bar completed';
    bcp.style.height = completedH + 'px';
    const tcp = document.createElement('div');
    tcp.className = 'bar-tooltip';
    tcp.textContent = `Completed: ${d.completed}`;
    bcp.appendChild(tcp);
    pair.appendChild(bcp);

    col.appendChild(pair);
    body.appendChild(col);

    /* x label — show every other day on narrow screens */
    const lbl = document.createElement('div');
    lbl.className = 'x-label';
    /* only render every 2nd label to avoid crowding */
    lbl.textContent = (i % 2 === 0) ? d.label : '';
    xAxis.appendChild(lbl);
  });

  document.getElementById('totalCreated').textContent   = totalCreated;
  document.getElementById('totalCompleted').textContent = totalCompleted;
}

function setTheme(t, btn) {
  document.documentElement.classList.toggle('dark', t === 'dark');
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

render();
</script>

<!--
=================================================================
  DESIGN SPEC — SO-56 Issues Per Day Bar Chart
=================================================================

REPLACES
  The 48-hour heatmap grid at the top of /activity.

COMPONENT ANATOMY
  chart-card
  ├── chart-header
  │     ├── chart-title  ("Issues per day — last 14 days")
  │     └── chart-legend  (created swatch / completed swatch)
  ├── chart-area
  │     ├── y-ticks   (4 ticks, top→bottom: max→0)
  │     └── chart-body + x-axis
  │           ├── day-col × 14
  │           │     ├── day-highlight  (hover bg)
  │           │     └── bar-pair
  │           │           ├── bar.created   (hollow / sf bg)
  │           │           └── bar.completed (accent fill)
  │           └── x-label × 14  (every 2nd shown)
  └── summary-row
        ├── stat: total created
        ├── divider
        └── stat: total completed

DATA CONTRACT  (Go template — passed from ActivityPage handler)
  .DailyStats  []DailyStat
  type DailyStat struct {
    Date      string  // "2006-01-02"
    Label     string  // "Apr 2"
    Created   int
    Completed int
  }

BAR SIZING
  Chart area:  height 120px
  niceMax:     CEIL(max(allVals) / 4) * 4   — snaps to multiple of 4
  bar height:  (value / niceMax) * 120px
  min height:  2px when value > 0 (ensures presence is visible)

COLORS
  created bar:   background rgb(var(--c-sf))  border 1px rgb(var(--c-bd))
  completed bar: background rgb(var(--c-ac))
  gridlines:     rgb(var(--c-bd) / 0.4)   4 horizontal bands

TOOLTIP
  Pure CSS :hover — no JS events needed
  Dark pill: bg rgb(var(--c-ink)), text rgb(var(--c-pg))
  Arrow below tooltip pointing down to bar

X-AXIS LABELS
  Render every 2nd day label to prevent crowding at 14 columns.
  Font: 9px, color rgb(var(--c-ink3)/0.45)

Y-AXIS TICKS
  Fixed 4 ticks above the baseline.
  Values: 0, max/4, max/2, 3*max/4, max
  Font: 9px, right-aligned, 18px wide column

SUMMARY ROW
  14-day totals for created and completed — quick scannable counts.

ACCESSIBILITY
  bar title attribute carries the raw count (tooltip fallback).
  Legend swatches have aria-label equivalents via role=img in Go template.

RESPONSIVE
  At <640px: gap between bars collapses to 1px.
  Y-tick column hidden below 480px (pure CSS media query).

DARK MODE
  Uses :root.dark CSS vars — no JS required after initial toggle.
  completed bar accent shifts from green (122 223 156) to indigo (79 70 229).
=================================================================
-->

</body>
</html>
